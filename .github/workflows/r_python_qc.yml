name: R + Python Data Pipeline QC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system GIS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: "https://packagemanager.posit.co/all/latest"

      - name: Install R packages
        shell: Rscript {0}
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          pkgs <- c("sf", "terra", "exactextractr", "blackmarbler",
                    "fixest", "dplyr", "readxl", "janitor", "pacman")
          installed <- rownames(installed.packages())
          needs <- setdiff(pkgs, installed)
          if (length(needs)) {
            install.packages(needs, quiet = FALSE)
          }

      - name: Run R data pipeline
        run: Rscript Scripts/obtener_datos.R
        env:
          NASA_EARTHDATA_TOKEN: ${{ secrets.NASA_EARTHDATA_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies and run cleaning
        run: |
          pip install pandas numpy
          python dashboard/limpieza.py

      - name: Verify outputs
        run: |
          test -f csv/panel_final.csv && echo "panel_final.csv OK"
          test -f csv/panel_final_limpio.csv && echo "panel_final_limpio.csv OK"
